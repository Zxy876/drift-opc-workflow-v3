# MetaAgent 进化参数
evolution:
  episodes_per_eval: 20           # 每代评估游玩局数
  max_generations: 10             # 最大进化代数
  flow_zone_min: 0.6              # Flow Zone 下界（通关率）
  flow_zone_max: 0.8              # Flow Zone 上界
  flow_zone_streak_target: 3      # 连续 N 代在 Flow Zone 才停止

# DesignerAgent 参数
designer:
  use_premium_threshold: 3        # difficulty >= 此值时用 Premium Publish
  workflow_poll_interval: 5       # 工作流轮询间隔（秒）
  workflow_timeout: 300           # 工作流超时（秒）


