# Drift 系统服务器地址配置
# 所有地址可通过环境变量覆盖： DRIFT_URL / ASYNCAIFLOW_URL / MC_HOST / MC_PORT
drift:
  backend_url: "http://localhost:8000"
  asyncaiflow_url: "http://localhost:8080"
  mc_server:
    host: "localhost"
    port: 25565
  panel_url: "http://localhost:8888/drift-experience-panel.html"

# Mineflayer Bot 配置
bot:
  username: "DriftRLAgent"
  bridge_port: 9999      # TCP Bridge 端口（Python ↔ Node.js）
  viewer_port: 3007      # prismarine-viewer 端口

# LLM 配置
llm:
  model: "glm-4"
  # API key 从环境变量 GLM_API_KEY 或 OPENAI_API_KEY 读取
